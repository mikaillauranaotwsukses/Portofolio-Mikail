<script>
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-tertiary');
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-tertiary');
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
        });

        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> UPLOADING...';
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> SUCCESS';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary-container');
                    btn.style.pointerEvents = 'auto';
                    form.reset();
                }, 2000);
            }, 1500);
        });
    </script>
